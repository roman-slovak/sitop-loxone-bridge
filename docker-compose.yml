services:
  sitop-bridge:
    image: sitop-loxone-bridge:latest
    build: .
    container_name: sitop-bridge
    command: ["python", "-m", "sitop_loxone_bridge", "bridge"]
    restart: unless-stopped
    env_file: .env
    volumes:
      - sitop_data:/data
    healthcheck:
      test: ["CMD", "python", "-m", "sitop_loxone_bridge.healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sitop-web:
    image: sitop-loxone-bridge:latest
    build: .
    container_name: sitop-web
    command: ["python", "-m", "sitop_loxone_bridge", "web"]
    restart: unless-stopped
    env_file: .env
    ports:
      - "8767:8767"
    volumes:
      - sitop_data:/data
    depends_on:
      - sitop-bridge
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8767/healthz',timeout=3).status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sitop_data:
