services:
  sitop-bridge:
    image: sitop-loxone-bridge:latest
    build: .
    container_name: sitop-bridge
    command: ["python", "-m", "sitop_loxone_bridge", "bridge"]
    restart: unless-stopped
    env_file: .env
    volumes:
      - sitop_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sitop-web:
    image: sitop-loxone-bridge:latest
    build: .
    container_name: sitop-web
    command: ["python", "-m", "sitop_loxone_bridge", "web"]
    restart: unless-stopped
    env_file: .env
    ports:
      - "8767:8767"
    volumes:
      - sitop_data:/data
    depends_on:
      - sitop-bridge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sitop_data:
