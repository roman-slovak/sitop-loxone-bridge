<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SITOP → Loxone Bridge{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}" />
  <script src="{{ url_for('static', path='/htmx.min.js') }}" defer></script>
  <script src="{{ url_for('static', path='/alpine.min.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <strong>SITOP</strong>
      <span class="arrow">→</span>
      <strong>Loxone</strong>
    </div>
    <nav>
      <a href="/" class="{{ 'is-active' if active == 'dashboard' else '' }}">Dashboard</a>
      <a href="/config" class="{{ 'is-active' if active == 'config' else '' }}">Configure</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
